<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
    font-family:"Inter",sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    background-size:cover;
    background-position:center;
    transition:background 0.5s ease;
}

/* dark overlay */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(6px);
    z-index:-1;
}

.container{
    width:90%;
    max-width:900px;
}

/* glass cards */
.card{
    background:rgba(255,255,255,0.08);
    border-radius:16px;
    padding:22px;
    margin:15px 0;
    backdrop-filter:blur(14px);
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

h1{
    text-align:center;
    font-weight:700;
    margin-bottom:10px;
}

.time{
    font-size:56px;
    font-weight:700;
    text-align:center;
}

.date{
    text-align:center;
    opacity:.85;
    margin-bottom:10px;
}

select{
    padding:10px;
    border-radius:10px;
    border:none;
    font-size:16px;
    background:#ffffff22;
    color:white;
}

select option{
    color:black;
}

.center{text-align:center;}

#currentClass{
    font-size:24px;
    font-weight:500;
}

#countdown{
    font-size:20px;
    opacity:.9;
}

</style>
</head>

<body>

<div class="container">

<h1>📚 Student Dashboard</h1>

<div class="card">
    <div id="date" class="date"></div>
    <div id="clock" class="time"></div>
</div>

<div class="card center">
    <h2>Schedule</h2>
    <select id="scheduleSelect">
        <option value="normal">Normal Day</option>
        <option value="delay">2 Hour Delay</option>
    </select>
</div>

<div class="card center">
    <h2 id="currentClass">Loading...</h2>
    <div id="countdown"></div>
</div>

</div>

<script>

/* ---------- AUTO BACKGROUND ---------- */
const img = new Image();
img.src = "image.jpg";

img.onload = () => {
    document.body.style.backgroundImage =
        "url('image.jpg')";
};

/* ---------- COOKIE FUNCTIONS ---------- */
function setCookie(name,value,days){
    let d=new Date();
    d.setTime(d.getTime()+days*86400000);
    document.cookie=name+"="+value+";expires="+d.toUTCString()+";path=/";
}

function getCookie(name){
    let match=document.cookie.match(new RegExp('(^| )'+name+'=([^;]+)'));
    return match?match[2]:"";
}

/* ---------- SCHEDULES (EDIT TIMES) ---------- */
const schedules={

normal:[
{name:"1st Period",start:"08:00",end:"08:50"},
{name:"2nd Period",start:"08:55",end:"09:45"},
{name:"3rd Period",start:"09:50",end:"10:40"},
{name:"Lunch",start:"10:45",end:"11:15"},
{name:"4th Period",start:"11:20",end:"12:10"},
{name:"5th Period",start:"12:15",end:"13:05"},
{name:"6th Period",start:"13:10",end:"14:00"}
],

delay:[
{name:"1st Period",start:"10:00",end:"10:40"},
{name:"2nd Period",start:"10:45",end:"11:25"},
{name:"3rd Period",start:"11:30",end:"12:10"},
{name:"Lunch",start:"12:15",end:"12:45"},
{name:"4th Period",start:"12:50",end:"13:30"},
{name:"5th Period",start:"13:35",end:"14:15"},
{name:"6th Period",start:"14:20",end:"15:00"}
]

};

/* ---------- CLOCK ---------- */
function updateClock(){
    const now=new Date();

    clock.textContent=now.toLocaleTimeString();

    date.textContent=now.toLocaleDateString(undefined,{
        weekday:"long",
        month:"long",
        day:"numeric",
        year:"numeric"
    });
}

/* ---------- CLASS TIMER ---------- */
function toMin(t){
    let [h,m]=t.split(":");
    return h*60+ +m;
}

function updateClass(){
    const type=scheduleSelect.value;
    const schedule=schedules[type];

    const now=new Date();
    const current=now.getHours()*60+now.getMinutes();

    let name="No class right now";
    let cd="";

    for(let c of schedule){
        let s=toMin(c.start);
        let e=toMin(c.end);

        if(current>=s && current<=e){
            name=c.name;

            let remaining=e-current;
            cd=`Ends in ${remaining} minutes`;
            break;
        }
    }

    currentClass.textContent=name;
    countdown.textContent=cd;
}

/* ---------- SAVE SCHEDULE ---------- */
scheduleSelect.onchange=()=>{
    setCookie("scheduleType",scheduleSelect.value,365);
};

let saved=getCookie("scheduleType");
if(saved) scheduleSelect.value=saved;

/* ---------- LOOP ---------- */
setInterval(()=>{
    updateClock();
    updateClass();
},1000);

updateClock();
updateClass();

</script>
</body>
</html>
