<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:"Inter",sans-serif;}
body{
    margin:0;
    min-height:100vh;
    color:white;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    background:#0f172a;
    background-size:cover;
    background-position:center;
    transition:background 0.5s ease;
    padding-top:30px;
}
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(6px);
    z-index:-1;
}

.container{
    width:90%;
    max-width:900px;
}

/* glass cards */
.card{
    background:rgba(255,255,255,0.08);
    border-radius:16px;
    padding:22px;
    margin:15px 0;
    backdrop-filter:blur(14px);
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.time{
    font-size:56px;
    font-weight:700;
    text-align:center;
}

.date{
    text-align:center;
    opacity:.85;
    margin-bottom:10px;
}

select,button{
    padding:10px;
    border-radius:10px;
    border:none;
    font-size:16px;
    background:#ffffff22;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

button:hover, select:hover{
    background:#ffffff33;
}

.center{text-align:center;}

#currentClass{
    font-size:24px;
    font-weight:500;
}

#countdown{
    font-size:20px;
    opacity:.9;
}

#shortcuts{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
    margin-top:15px;
}

.shortcut{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:80px;
    text-align:center;
    text-decoration:none;
    color:white;
    font-size:14px;
}

.shortcut img{
    width:48px;
    height:48px;
    margin-bottom:6px;
    border-radius:8px;
    background:white;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
    <div id="date" class="date"></div>
    <div id="clock" class="time"></div>
</div>

<div class="card center">
    <h2>Schedule</h2>
    <select id="scheduleSelect">
        <option value="normal">Normal Day</option>
        <option value="delay">2 Hour Delay</option>
    </select>
</div>

<div class="card center">
    <h2 id="currentClass">Loading...</h2>
    <div id="countdown"></div>
</div>

<div class="card center">
    <button id="addShortcutBtn">➕ Add Shortcut</button>
    <div id="shortcuts"></div>
</div>

</div>

<script>

/* ---------- BACKGROUND ---------- */
const img = new Image();
img.src = "image.jpg";
img.onload = () => { document.body.style.backgroundImage = "url('image.jpg')"; };

/* ---------- COOKIE FUNCTIONS ---------- */
function setCookie(name,value,days){
    let d=new Date();
    d.setTime(d.getTime()+days*86400000);
    document.cookie=name+"="+encodeURIComponent(value)+";expires="+d.toUTCString()+";path=/";
}
function getCookie(name){
    let match=document.cookie.match(new RegExp('(^| )'+name+'=([^;]+)'));
    return match?decodeURIComponent(match[2]):"";
}

/* ---------- SCHEDULE ---------- */
const schedules={
normal:[
    {name:"1st Period - Art",start:"7:25",end:"8:10"},
    {name:"2nd Period - Cooking",start:"8:14",end:"8:58"},
    {name:"3rd Period - English",start:"9:02",end:"9:46"},
    {name:"4th Period - Geometry",start:"9:50",end:"10:35"},
    {name:"5th Period - Flashtime A",start:"10:35",end:"11:05"},
    {name:"5th Period - Flashtime B",start:"11:05",end:"11:35"},
    {name:"5th Period - Flashtime C",start:"11:35",end:"12:05"},
    {name:"6th Period - Tech",start:"12:09",end:"12:53"},
    {name:"7th Period - Biology",start:"12:57",end:"13:41"},
    {name:"8th Period - Careers",start:"13:45",end:"14:30"}
],
delay:[
{name:"1st Period",start:"08:00",end:"08:50"},
{name:"2nd Period",start:"08:55",end:"09:45"},
{name:"3rd Period",start:"09:50",end:"10:40"},
{name:"Lunch",start:"10:45",end:"11:15"},
{name:"4th Period",start:"11:20",end:"12:10"},
{name:"5th Period",start:"12:15",end:"13:05"},
{name:"6th Period",start:"13:10",end:"14:00"}
]
};

/* ---------- CLOCK ---------- */
function updateClock(){
    const now=new Date();
    clock.textContent=now.toLocaleTimeString();
    date.textContent=now.toLocaleDateString(undefined,{
        weekday:"long", month:"long", day:"numeric", year:"numeric"
    });
}

/* ---------- CLASS TIMER ---------- */
function toMin(t){let [h,m]=t.split(":"); return h*60+ +m;}
function updateClass(){
    const type=scheduleSelect.value;
    const schedule=schedules[type];
    const now=new Date();
    const current=now.getHours()*60+now.getMinutes();
    let name="No class right now"; let cd="";
    for(let c of schedule){
        let s=toMin(c.start), e=toMin(c.end);
        if(current>=s && current<=e){
            name=c.name;
            let remaining=e-current;
            cd=`Ends in ${remaining} minutes`;
            break;
        }
    }
    currentClass.textContent=name;
    countdown.textContent=cd;
}

/* ---------- SAVE SCHEDULE ---------- */
scheduleSelect.onchange=()=>{ setCookie("scheduleType",scheduleSelect.value,365); };
let saved=getCookie("scheduleType");
if(saved) scheduleSelect.value=saved;

/* ---------- SHORTCUTS ---------- */
let shortcuts=[];
function loadShortcuts(){
    let saved=getCookie("shortcuts");
    if(saved) shortcuts=JSON.parse(saved);
    renderShortcuts();
}
function renderShortcuts(){
    const container=document.getElementById("shortcuts");
    container.innerHTML="";
    shortcuts.forEach(s=>{
        let a=document.createElement("a");
        a.href=s.url; a.target="_blank"; a.className="shortcut";
        let img=document.createElement("img");
        img.src=s.favicon;
        let span=document.createElement("span");
        span.textContent=s.name;
        a.appendChild(img);
        a.appendChild(span);
        container.appendChild(a);
    });
}
document.getElementById("addShortcutBtn").onclick=async()=>{
    let url=prompt("Enter website URL (https://example.com)");
    if(!url) return;
    if(!url.startsWith("http")) url="https://"+url;
    let name=url.replace(/https?:\/\/(www\.)?/,"").split(/[\/.]/)[0];
    let favicon=url.split("/")[0]+"/favicon.ico";
    favicon="https://www.google.com/s2/favicons?domain="+new URL(url).hostname;
    shortcuts.push({url,name,favicon});
    setCookie("shortcuts",JSON.stringify(shortcuts),365);
    renderShortcuts();
};

/* ---------- INIT ---------- */
loadShortcuts();
setInterval(()=>{ updateClock(); updateClass(); },1000);
updateClock(); updateClass();

</script>
</body>
</html>
